# stage4_vs_stage5.yaml — Head-to-head comparison of two generations
#
# Focused 2-survey comparison: DESI-like vs MUST-like, matched redshift
# range. Useful for computing clean improvement factors.

shmr_params:
  use_mass_dependent_scatter: true

forecast:
  n_R_bins: 10
  n_Mh_bins: 200
  systematic_floor_fraction: 0.05
  include_nuisance_params: true
  vary_z_evolution: false

nuisance:
  sigma_m: 0.02
  sigma_dz_source: 0.03

surveys:
  stage4_low_z:
    name: "Stage-IV Low-z"
    area_deg2: 14000
    z_min: 0.05
    z_max: 0.4
    n_gal_total: 10000000
    log_Mstar_min: 9.0

  stage5_wide:
    name: "Stage-V Wide"
    area_deg2: 10000
    z_min: 0.05
    z_max: 1.0
    n_gal_total: 50000000
    log_Mstar_min: 8.5
    log_Mstar_min_z_dep:
      base: 8.5
      slope: 1.0
