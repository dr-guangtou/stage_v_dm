# default.yaml — Core 4-survey comparison across generations
#
# Compares one Stage-III, one Stage-IV, and two Stage-V survey archetypes.
# Systematics enabled: 5% floor + nuisance parameter marginalization.
# Mass-dependent scatter (Cao & Tinker 2020) is on by default.

shmr_params:
  use_mass_dependent_scatter: true

forecast:
  n_R_bins: 10
  n_Mh_bins: 200
  dz: 0.2
  frac_step: 0.01
  systematic_floor_fraction: 0.05
  include_nuisance_params: true

lensing:
  n_source_per_arcmin2: 25.0
  sigma_e: 0.26
  z_source_median: 1.0

nuisance:
  sigma_m: 0.02
  sigma_dz_source: 0.03

surveys:
  stage3_shallow_wide:
    name: "Stage-III Shallow Wide"
    area_deg2: 7500
    z_min: 0.02
    z_max: 0.2
    n_gal_total: 700000
    log_Mstar_min: 9.5

  stage4_low_z:
    name: "Stage-IV Low-z"
    area_deg2: 14000
    z_min: 0.05
    z_max: 0.4
    n_gal_total: 10000000
    log_Mstar_min: 9.0

  stage5_wide:
    name: "Stage-V Wide"
    area_deg2: 10000
    z_min: 0.05
    z_max: 1.0
    n_gal_total: 50000000
    log_Mstar_min: 8.5
    log_Mstar_min_z_dep:
      base: 8.5
      slope: 1.0

  stage5_deep:
    name: "Stage-V Deep"
    area_deg2: 3000
    z_min: 0.1
    z_max: 1.5
    n_gal_total: 20000000
    log_Mstar_min: 8.0
    log_Mstar_min_z_dep:
      base: 8.0
      slope: 1.0
