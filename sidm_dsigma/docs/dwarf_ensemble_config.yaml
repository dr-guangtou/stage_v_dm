# ============================================
# Stage-V Dwarf Ensemble Configuration
# SHMR-Based Galaxy Selection
# ============================================

mode: SHMR

cosmology:
  name: "Planck18"
  h: 0.674
  Omega_m: 0.315
  Omega_L: 0.685
  sigma8: 0.811
  ns: 0.965

ensemble:
  N_halos: 800
  random_seed: 123

redshift:
  model: "gaussian"
  mean: 0.15
  sigma: 0.07
  z_min: 0.05
  z_max: 0.3

stellar_mass_distribution:
  model: "lognormal"
  logMstar_mean: 7.5 # log10(M_star / Msun)
  logMstar_sigma: 0.5
  logMstar_min: 6.0
  logMstar_max: 9.0

shmr:
  model: "Behroozi13"
  scatter_logMhalo: 0.3 # dex
  assume_central: true

concentration:
  model: "DiemerJoyce19"
  scatter_logc: 0.20

stacking:
  weight_scheme: "equal"

projection:
  R_min_kpc: 1
  R_max_kpc: 300
  N_R_bins: 30

sidm:
  sigma_over_m_grid: [0.2, 0.5, 1.0, 2.0] # cm^2/g

tier2:
  enabled: true
  outer_profile_model: "dk14_like"
  stitch_method: "logistic_logrho_blend"
  r_match_mode: "fraction_r200c"
  r_match_value: 1.0
  smooth_width_dex: 0.18
  continuity: "density"
  regime: "dwarf"
