# ============================================
# Stage-V Cluster Ensemble Configuration
# HMF-Based Halo Selection
# ============================================

mode: HMF

cosmology:
  name: "Planck18"
  h: 0.674
  Omega_m: 0.315
  Omega_L: 0.685
  sigma8: 0.811
  ns: 0.965

ensemble:
  N_halos: 400
  random_seed: 42

redshift:
  model: "gaussian"
  mean: 0.45
  sigma: 0.15
  z_min: 0.2
  z_max: 0.8

mass_function:
  model: "Tinker08"
  mass_definition: "M200c"
  M_min: 1.0e14 # Msun
  M_max: 1.0e15 # Msun

selection:
  type: "logistic"
  logM_cut: 14.2
  sigma_sel_dex: 0.25

concentration:
  model: "DiemerJoyce19"
  scatter_logc: 0.18

stacking:
  weight_scheme: "equal" # options: equal, sigma_crit_inv2

projection:
  R_min_kpc: 50
  R_max_kpc: 2000
  N_R_bins: 30

sidm:
  sigma_over_m_grid: [0.05, 0.1, 0.2, 0.3] # cm^2/g; cluster-focused sub-unity regime

tier2:
  enabled: true
  outer_profile_model: "dk14_like"
  stitch_method: "logistic_logrho_blend"
  r_match_mode: "fraction_r200m"
  r_match_value: 0.8
  smooth_width_dex: 0.15
  continuity: "density"
  regime: "cluster"

tier3:
  enabled: true
  correction_model: "rt_gamma_shift"
  sigma_pivot: 1.0
  apply_to_regimes: ["cluster"]
  calibration_mode: "manual_preset"
  preset: "moderate"
  regime: "cluster"
  rt_shift:
    A_rt: -0.08
    use_concentration_dependence: true
    A_c: 0.5
  gamma_shift:
    A_gamma: -0.20
