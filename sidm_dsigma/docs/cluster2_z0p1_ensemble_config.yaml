mode: HMF

cosmology:
  name: "Planck18"
  h: 0.674
  Omega_m: 0.315
  Omega_L: 0.685
  sigma8: 0.811
  ns: 0.965

ensemble:
  N_halos: 400
  random_seed: 201

redshift:
  model: "fixed"
  value: 0.1

mass_function:
  model: "Tinker08"
  mass_definition: "M200c"
  M_min: 1.0e14
  M_max: 1.0e15

selection:
  type: "logistic"
  logM_cut: 14.2
  sigma_sel_dex: 0.25

concentration:
  model: "DiemerJoyce19"
  scatter_logc: 0.18

stacking:
  weight_scheme: "equal"

projection:
  R_min_kpc: 50
  R_max_kpc: 2000
  N_R_bins: 30

sidm:
  parameterization: "velocity_dependent"
  sigma_grid_definition: "effective"
  sigma0_over_m_grid: [0.05, 0.1, 0.2, 0.3]
  w_km_s: 40.0
  time_model: "since_formation"
  mass_definition: "200c"
  cdm_reference:
    profile_source: "parametric"
    sigma0_over_m: 1.0e-6
    w_km_s: 1.0e-6
    time_model: "since_formation"

tier2:
  enabled: true
  outer_profile_model: "dk14_like"
  stitch_method: "logistic_logrho_blend"
  r_match_mode: "fraction_r200m"
  r_match_value: 0.8
  smooth_width_dex: 0.15
  continuity: "density"
  regime: "cluster"

tier3:
  enabled: true
  correction_model: "rt_gamma_shift"
  sigma_pivot: 1.0
  apply_to_regimes: ["cluster"]
  calibration_mode: "manual_preset"
  preset: "moderate"
  regime: "cluster"
  rt_shift:
    A_rt: -0.08
    use_concentration_dependence: true
    A_c: 0.5
  gamma_shift:
    A_gamma: -0.20
